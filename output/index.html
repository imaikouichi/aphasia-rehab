<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>こえでこたえる リハビリカード 🍎</title>
    <style>
        /* 優しい色合いと、見やすい大きな文字のデザイン */
        :root {
            --bg-color: #f7f9fa;
            --card-bg: #ffffff;
            --text-color: #2c3e50;
            --primary-color: #3498db;
            --success-color: #2ecc71;
            --warning-color: #f1c40f;
            --danger-color: #e74c3c;
            --shadow-color: rgba(0, 0, 0, 0.08);
        }

        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', Meiryo, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            max-width: 600px;
            width: 100%;
            text-align: center;
        }

        /* レベルと進捗のヘッダー */
        .header-info {
            background-color: #ebf5fb;
            border-radius: 16px;
            padding: 15px;
            margin-bottom: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.02);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .level-badge {
            background-color: var(--primary-color);
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 1.1rem;
        }

        .progress-text {
            font-size: 1.1rem;
            font-weight: bold;
            color: #34495e;
        }

        /* ゲージメーター */
        .progress-bar-container {
            width: 100%;
            height: 12px;
            background-color: #d6dbdf;
            border-radius: 6px;
            margin-top: 8px;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            width: 0%;
            background-color: var(--success-color);
            transition: width 0.5s ease-out;
        }

        /* あそびかた選択のコンテナ */
        .mode-select-container {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 15px;
            width: 100%;
        }

        .mode-tab-button {
            flex: 1;
            padding: 12px 10px;
            font-size: 1.05rem;
            font-weight: bold;
            border: 2px solid #d6dbdf;
            border-radius: 12px;
            background-color: #ffffff;
            color: #7f8c8d;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .mode-tab-button.active {
            border-color: var(--primary-color);
            background-color: #ebf5fb;
            color: var(--primary-color);
            box-shadow: 0 4px 10px rgba(52, 152, 219, 0.15);
        }

        /* レベルやカテゴリを選ぶボタンのコンテナ */
        .selector-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
            margin-bottom: 20px;
            background-color: #ffffff;
            padding: 12px;
            border-radius: 16px;
            box-shadow: 0 4px 15px var(--shadow-color);
        }

        .select-btn {
            padding: 10px 16px;
            font-size: 0.95rem;
            font-weight: bold;
            border: 1px solid #d6dbdf;
            border-radius: 20px;
            background-color: #fcfcfc;
            color: var(--text-color);
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .select-btn:hover {
            background-color: #f2f4f4;
        }

        .select-btn.active {
            background-color: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
            box-shadow: 0 4px 10px rgba(52, 152, 219, 0.2);
        }

        /* リハビリカードのスタイル */
        .card {
            background-color: var(--card-bg);
            border-radius: 24px;
            padding: 30px 20px;
            box-shadow: 0 10px 30px var(--shadow-color);
            margin-bottom: 30px;
            position: relative;
            overflow: hidden;
        }

        /* イラスト表示エリア */
        .illustration-container {
            height: 180px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 15px;
            margin-bottom: 10px;
        }

        .emoji-display {
            font-size: 8rem;
            line-height: 1;
            filter: drop-shadow(0 5px 10px rgba(0,0,0,0.1));
        }

        .image-display {
            max-height: 100%;
            max-width: 100%;
            object-fit: contain;
            border-radius: 12px;
            filter: drop-shadow(0 5px 10px rgba(0,0,0,0.1));
        }

        /* イラストのすぐ下に表示するパスボタンのエリア */
        .pass-btn-container {
            margin-bottom: 5px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* パスボタンのデザイン */
        .pass-button {
            padding: 8px 20px;
            font-size: 1.1rem;
            font-weight: bold;
            border: 2px solid #e74c3c;
            border-radius: 20px;
            background-color: #fff0f0;
            color: var(--danger-color);
            cursor: pointer;
            display: none;
            transition: all 0.2s ease;
            box-shadow: 0 4px 10px rgba(231, 76, 60, 0.15);
        }

        .pass-button:hover {
            background-color: var(--danger-color);
            color: white;
            transform: scale(1.05);
        }

        .question-text {
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 10px;
        }

        /* マイクボタンのデザイン */
        .mic-button {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            border: none;
            background-color: var(--primary-color);
            color: white;
            font-size: 2.2rem;
            cursor: pointer;
            outline: none;
            box-shadow: 0 6px 20px rgba(52, 152, 219, 0.4);
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin: 10px 0;
        }

        .mic-button:hover {
            transform: scale(1.05);
            background-color: #2980b9;
        }

        .mic-button:active {
            transform: scale(0.95);
        }

        /* 音声認識中のアニメーション */
        .mic-button.listening {
            background-color: var(--danger-color);
            box-shadow: 0 0 0 15px rgba(231, 76, 60, 0.3);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(231, 76, 60, 0.4); }
            70% { box-shadow: 0 0 0 20px rgba(231, 76, 60, 0); }
            100% { box-shadow: 0 0 0 0 rgba(231, 76, 60, 0); }
        }

        .status-message {
            font-size: 1.1rem;
            min-height: 1.5rem;
            margin: 8px 0;
            color: #7f8c8d;
            font-weight: 500;
        }

        /* 認識された言葉の表示 */
        .recognized-word {
            font-size: 1.4rem;
            font-weight: bold;
            color: #2c3e50;
            background-color: #ecf0f1;
            padding: 8px 20px;
            border-radius: 12px;
            display: inline-block;
            margin: 5px 0;
            min-width: 150px;
            min-height: 1.8rem;
        }

        /* 結果表示 */
        .result-container {
            font-size: 1.8rem;
            font-weight: bold;
            min-height: 2.5rem;
            margin: 10px 0;
            line-height: 1.4;
        }

        .result-success {
            color: var(--success-color);
            animation: popIn 0.3s ease;
            display: block;
        }

        .result-info {
            color: var(--primary-color);
            animation: popIn 0.3s ease;
        }

        @keyframes popIn {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* ヒント表示エリア */
        .hint-card {
            background-color: #fef9e7;
            border: 2px dashed #f5b041;
            border-radius: 16px;
            padding: 15px;
            margin: 15px 0;
            display: none;
        }

        .hint-title {
            font-weight: bold;
            color: #d35400;
            margin-bottom: 5px;
            font-size: 1.1rem;
        }

        .hint-content {
            font-size: 1.3rem;
            color: #e67e22;
            font-weight: bold;
            line-height: 1.4;
            white-space: pre-line;
        }

        /* 操作ボタン */
        .action-button {
            padding: 12px 35px;
            font-size: 1.2rem;
            font-weight: bold;
            border: none;
            border-radius: 12px;
            background-color: var(--success-color);
            color: white;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(46, 204, 113, 0.3);
            margin-top: 10px;
            display: none;
            transition: all 0.2s ease;
        }

        .action-button:hover {
            background-color: #27ae60;
            transform: translateY(-2px);
        }

        /* 音声再生ボタンの補助 */
        .speak-button {
            background: none;
            border: none;
            color: var(--primary-color);
            font-size: 1.5rem;
            cursor: pointer;
            vertical-align: middle;
            margin-left: 10px;
        }

        .speak-button:hover {
            color: #2980b9;
        }

        /* レベルアップ時のお祝い画面 */
        .level-up-modal {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(255, 255, 255, 0.96);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
            transform: translateY(100%);
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border-radius: 24px;
        }

        .level-up-modal.show {
            transform: translateY(0);
        }

        .level-up-title {
            font-size: 2.2rem;
            color: #e74c3c;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .level-up-text {
            font-size: 1.3rem;
            color: var(--text-color);
            margin-bottom: 25px;
            padding: 0 20px;
            line-height: 1.5;
        }

        /* スマートフォン向け（きゅっとまとまったレイアウト） */
        @media (max-width: 600px) {
            body {
                padding: 10px;
            }
            .card {
                padding: 15px 12px;
                margin-bottom: 10px;
            }
            .header-info {
                padding: 10px;
                margin-bottom: 12px;
            }
            .mode-select-container {
                margin-bottom: 10px;
            }
            .selector-container {
                padding: 8px;
                margin-bottom: 12px;
                gap: 6px;
            }
            .select-btn {
                padding: 8px 12px;
                font-size: 0.85rem;
            }
            .mode-tab-button {
                padding: 10px 8px;
                font-size: 0.95rem;
            }
            .question-text {
                font-size: 1.3rem;
                margin-bottom: 5px;
            }
            .illustration-container {
                height: 140px;
                margin-top: 5px;
                margin-bottom: 5px;
            }
            .emoji-display {
                font-size: 6.5rem;
            }
            .status-message {
                font-size: 0.95rem;
                margin: 5px 0;
            }
            .mic-button {
                width: 75px;
                height: 75px;
                font-size: 1.8rem;
                margin: 5px 0;
            }
            .recognized-word {
                font-size: 1.25rem;
                padding: 6px 15px;
                min-width: 120px;
            }
            .result-container {
                font-size: 1.5rem;
                min-height: 2rem;
                margin: 8px 0;
            }
            .hint-card {
                padding: 10px;
                margin: 10px 0;
            }
            .hint-title {
                font-size: 1rem;
            }
            .hint-content {
                font-size: 1.15rem;
            }
            .action-button {
                padding: 10px 25px;
                font-size: 1.1rem;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <!-- あそびかた選択 -->
    <div class="mode-select-container">
        <button class="mode-tab-button active" id="mode-level-btn">📏 レベルで れんしゅう</button>
        <button class="mode-tab-button" id="mode-genre-btn">⭐ ジャンルで れんしゅう</button>
    </div>

    <!-- 選択肢（レベル） -->
    <div class="selector-container" id="level-selector">
        <button class="select-btn active" onclick="selectLevel(1)">レベル 1 (2文字)</button>
        <button class="select-btn" onclick="selectLevel(2)">レベル 2 (3文字)</button>
        <button class="select-btn" onclick="selectLevel(3)">レベル 3 (4文字)</button>
    </div>

    <!-- 選択肢（ジャンル） -->
    <div class="selector-container" id="genre-selector" style="display: none;">
        <button class="select-btn" onclick="selectGenre('どうぶつ')">🐾 どうぶつ</button>
        <button class="select-btn" onclick="selectGenre('くだもの')">🍊 くだもの</button>
        <button class="select-btn" onclick="selectGenre('たべもの')">🍳 たべもの</button>
        <button class="select-btn" onclick="selectGenre('やさい')">🥬 やさい</button>
        <button class="select-btn" onclick="selectGenre('すいーつ')">🍰 すいーつ</button>
        <button class="select-btn" onclick="selectGenre('おさけ・のみもの')">🍶 おさけ・のみもの</button>
        <button class="select-btn" onclick="selectGenre('おんがく・がっき')">🎵 おんがく・がっき</button>
    </div>

    <!-- レベルと進捗表示 -->
    <div class="header-info">
        <div>
            <span class="level-badge" id="level-badge">レベル 1：２文字</span>
        </div>
        <div style="text-align: right; flex-grow: 1; margin-left: 20px;">
            <div class="progress-text" id="progress-text">せいかい： 0 / 10</div>
            <div class="progress-bar-container">
                <div class="progress-bar-fill" id="progress-bar-fill"></div>
            </div>
        </div>
    </div>

    <div class="card">
        <!-- レベルアップ時のポップアップ画面 -->
        <div class="level-up-modal" id="level-up-modal">
            <div style="font-size: 5rem; margin-bottom: 10px;">🎉</div>
            <div class="level-up-title">レベルアップ！</div>
            <div class="level-up-text" id="level-up-text">おめでとうございます！<br>次は３文字の言葉に挑戦です！</div>
            <button class="action-button" id="start-next-level-btn" style="display: block;">次へすすむ ➡️</button>
        </div>

        <div class="question-text">
            これ なあに？
            <button class="speak-button" id="speak-question-btn" title="声をきく">🔊</button>
        </div>
        
        <!-- イラスト表示エリア (画像優先、なければ絵文字) -->
        <div class="illustration-container" id="illustration-container">
            <div class="emoji-display" id="emoji-display">🐕</div>
        </div>

        <!-- あなたが言った言葉 (イラストのすぐ下) -->
        <div style="margin: 8px 0;">
            <div class="status-message" style="font-size: 0.9rem; margin-bottom: 3px; margin-top: 5px;">あなたが言った言葉：</div>
            <div class="recognized-word" id="recognized-word">（お返事待ち）</div>
        </div>

        <!-- イラストのすぐ下に表示されるパスボタン -->
        <div class="pass-btn-container">
            <button class="pass-button" id="pass-btn">パス（こたえをみる） 🔑</button>
        </div>

        <!-- 音声入力の状況表示 -->
        <div class="status-message" id="status-message">マイクボタンを押して話してください</div>

        <!-- マイクボタン -->
        <button class="mic-button" id="mic-btn">🎙️</button>

        <!-- 結果表示 -->
        <div class="result-container" id="result-container"></div>

        <!-- ヒント表示 -->
        <div class="hint-card" id="hint-card">
            <div class="hint-title" id="hint-title">💡 やさしいヒント</div>
            <div class="hint-content" id="hint-content"></div>
        </div>

        <!-- 次へ進むボタン -->
        <button class="action-button" id="next-btn">つぎへ すすむ ➡️</button>
    </div>
</div>

    const levelBadge = document.getElementById('level-badge');

    // 配列をランダムにシャッフルし、指定の件数を取り出す関数
    function getRandomQuestions(level, count = 10) {
        const pool = [...questionsPool[level]];
        for (let i = pool.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [pool[i], pool[j]] = [pool[j], pool[i]];
        }
        return pool.slice(0, count);
    }

    // ジャンルからランダムに問題を取り出す関数
    function getRandomQuestionsByGenre(genre, count = 10) {
        let pool = [];
        // すべてのレベルから該当カテゴリの問題を集める
        for (let level in questionsPool) {
            pool = pool.concat(questionsPool[level].filter(q => q.category === genre));
        }
        
        // シャッフルする
        for (let i = pool.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [pool[i], pool[j]] = [pool[j], pool[i]];
        }
        return pool.slice(0, count);
    }

    // 音声認識の準備
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    let recognition = null;

    if (SpeechRecognition) {
        recognition = new SpeechRecognition();
        recognition.lang = 'ja-JP';
        recognition.interimResults = false;
        recognition.maxAlternatives = 1;

        recognition.onstart = () => {
            isListening = true;
            micBtn.classList.add('listening');
            statusMessage.innerText = 'どうぞ、お話しください... 🎙️';
            recognizedWord.innerText = '（きいています）';
            resultContainer.innerHTML = '';
        };

        recognition.onend = () => {
            isListening = false;
            micBtn.classList.remove('listening');
        };

        recognition.onresult = (event) => {
            const speechResult = event.results[0][0].transcript.trim();
            recognizedWord.innerText = speechResult;
            checkAnswer(speechResult);
        };

        recognition.onerror = (event) => {
            console.error(event.error);
            if (event.error === 'no-speech') {
                statusMessage.innerText = '声が聞き取れませんでした。もう一度押してください。';
            } else {
                statusMessage.innerText = 'マイクが使えません。許可を確認してください。';
            }
            recognizedWord.innerText = '（もう一度試してください）';
        };
    } else {
        statusMessage.innerText = '音声認識に対応していません。Google Chromeをお使いください。';
        micBtn.style.display = 'none';
    }

    // 音声読み上げ機能
    function speakText(text) {
        if ('speechSynthesis' in window) {
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'ja-JP';
            utterance.rate = 0.95;
            window.speechSynthesis.speak(utterance);
        }
    }

    speakQuestionBtn.addEventListener('click', () => {
        speakText('これ なあに？');
    });

    // 新しいレベルを開始するときの準備
    function startLevel(level) {
        currentMode = 'level';
        currentLevel = level;
        correctCount = 0;
        currentQuestionIdx = 0;
        activeQuestions = getRandomQuestions(currentLevel, 10);
        updateSelectorUI();
        loadQuestion();
    }

    // 新しいジャンルを開始するときの準備
    function startGenre(genre) {
        currentMode = 'genre';
        currentGenre = genre;
        correctCount = 0;
        currentQuestionIdx = 0;
        activeQuestions = getRandomQuestionsByGenre(currentGenre, 10);
        updateSelectorUI();
        loadQuestion();
    }

    // 画面の更新（新しい問題を表示）
    function loadQuestion() {
        if (activeQuestions.length === 0) {
            statusMessage.innerText = '問題がみつかりませんでした。別のボタンを押してください。';
            return;
        }
        const q = activeQuestions[currentQuestionIdx];

        // イラスト表示を更新 (画像優先、なければ絵文字)
        illustrationContainer.innerHTML = '';
        const img = new Image();
        img.src = q.image;
        img.className = 'image-display';
        img.alt = q.answers[0];
        
        img.onload = () => {
            illustrationContainer.appendChild(img);
        };
        img.onerror = () => {
            const emojiDiv = document.createElement('div');
            emojiDiv.className = 'emoji-display';
            emojiDiv.id = 'emoji-display';
            emojiDiv.innerText = q.emojiOverride || q.emoji;
            illustrationContainer.appendChild(emojiDiv);
        };

        // 画面初期化
        recognizedWord.innerText = '（お返事待ち）';
        statusMessage.innerText = 'マイクボタンを押して話してください';
        resultContainer.innerHTML = '';
        hintCard.style.display = 'none';
        nextBtn.style.display = 'none';
        passBtn.style.display = 'none';
        micBtn.style.display = 'inline-flex';
        wrongCount = 0;

        // レベルと進捗の更新
        updateProgressUI();

        // 自動で「これなあに？」と話す
        setTimeout(() => {
            speakText('これ なあに？');
        }, 500);
    }

            const levelNames = { 1: 'レベル 1：２文字', 2: 'レベル 2：３文字', 3: 'レベル 3：４文字' };

        } else {
            const genreNames = {
                'どうぶつ': '🐾 どうぶつ',
                'くだもの': '🍊 くだもの',
                'たべもの': '🍳 たべもの',
                'やさい': '🥬 やさい',
                'すいーつ': '🍰 すいーつ',
                'おさけ・のみもの': '🍶 おさけ',
                'おんがく・がっき': '🎵 おんがく'
            };
            levelBadge.innerText = `ジャンル：${genreNames[currentGenre] || currentGenre}`;
        }
        progressText.innerText = `せいかい： ${correctCount} / ${activeQuestions.length}`;

        const maxQuestions = activeQuestions.length > 0 ? activeQuestions.length : 10;
        const percentage = (correctCount / maxQuestions) * 100;
        progressBarFill.style.width = `${percentage}%`;
    }

    // 選択ボタンのアクティブ状態を更新する
    function updateSelectorUI() {
        const modeLevelBtn = document.getElementById('mode-level-btn');
        const modeGenreBtn = document.getElementById('mode-genre-btn');
        const levelSelector = document.getElementById('level-selector');
        const genreSelector = document.getElementById('genre-selector');

        if (currentMode === 'level') {
            modeLevelBtn.classList.add('active');
            modeGenreBtn.classList.remove('active');
            levelSelector.style.display = 'flex';
            genreSelector.style.display = 'none';

            const levelBtns = levelSelector.querySelectorAll('.select-btn');
            levelBtns.forEach((btn, idx) => {
                if (idx + 1 === currentLevel) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });
        } else {
            modeLevelBtn.classList.remove('active');
            modeGenreBtn.classList.add('active');
            levelSelector.style.display = 'none';
            genreSelector.style.display = 'flex';

            const genreBtns = genreSelector.querySelectorAll('.select-btn');
            const genreList = ['どうぶつ', 'くだもの', 'たべもの', 'やさい', 'すいーつ', 'おさけ・のみもの', 'おんがく・がっき'];
            genreBtns.forEach((btn, idx) => {
                if (genreList[idx] === currentGenre) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });
        }
    }

    // モード切り替えイベント
    document.getElementById('mode-level-btn').addEventListener('click', () => {
        startLevel(1);
    });
    document.getElementById('mode-genre-btn').addEventListener('click', () => {
        startGenre('どうぶつ');
    });

    // レベル選択・ジャンル選択（グローバル公開）
    window.selectLevel = function(level) {
        startLevel(level);
    };

    window.selectGenre = function(genre) {
        startGenre(genre);
    };

    // マイクボタンを押したときの動作
    micBtn.addEventListener('click', () => {
        if (!recognition) return;
        if (isListening) {
            recognition.stop();
        } else {
            recognition.start();
        }
    });

    // カテゴリごとの褒め言葉コメント
    const praiseMessages = {
        'どうぶつ': 'かわいいですね！🐾',
        'くだもの': '美味しそうですね！🍊',
        'たべもの': '食べたくなってきましたね！😋',
        'やさい': 'シャキシャキしていて美味しそうですね！🥬',
        'すいーつ': '甘くて美味しそうですね！🍰',
        'おさけ・のみもの': '乾杯したくなりますね！🍶',
        'おんがく・がっき': '楽しいリズムですね！🎵'
    };

    // 答え合わせのロジック
    function checkAnswer(userSpeech) {
        const q = activeQuestions[currentQuestionIdx];

        // ひらがな・カタカナ・漢字の揺れを許容
        const isCorrect = q.answers.some(ans => {
            return userSpeech.includes(ans) || ans.includes(userSpeech);
        });

        if (isCorrect) {
            // 進捗度（0〜10）に応じた基本の褒め言葉
            let basePraise = "";
            let audioPraise = "";
            if (correctCount < 2) {
                basePraise = "🎯 せいかい！ その調子！";
                audioPraise = "せいかい！ その調子です！";
            } else if (correctCount < 5) {
                basePraise = "🎯 大正解！ 素晴らしいです！";
                audioPraise = "大正解！ 素晴らしいです！";
            } else if (correctCount < 8) {
                basePraise = "🎯 お見事！ どんどん思い出せていますね！";
                audioPraise = "おみごと！ どんどん思い出せていますね！";
            } else {
                basePraise = "🎯 素晴らしい！ あと少しでクリアです！";
                audioPraise = "素晴らしい！ あと少しでクリアです！";
            }

            // カテゴリ特有の掛け声を追加
            if (q.category && praiseMessages[q.category]) {
                basePraise += "<br><span style='font-size: 1.4rem; font-weight: normal; color: #7f8c8d;'>" + praiseMessages[q.category] + "</span>";
                audioPraise += "、" + praiseMessages[q.category].replace(/[🐾🍊😋🍰🍶🎵]/g, '');
            }

            resultContainer.innerHTML = `<span class="result-success">${basePraise}</span>`;
            statusMessage.innerText = 'よくできました！';
            speakText(audioPraise);
            
            correctCount++;
            updateProgressUI();

            if (correctCount >= activeQuestions.length) {
                setTimeout(showLevelUp, 1500);
            } else {
                nextBtn.style.display = 'inline-block';
            }
            hintCard.style.display = 'none';
            passBtn.style.display = 'none';
        } else {
            // 不正解の場合
            wrongCount++;
            resultContainer.innerHTML = '<span style="color: #e74c3c;">おしい！</span>';
            statusMessage.innerText = 'もう一回チャレンジしてみましょう';
            
            hintCard.style.display = 'block';
            
            // 段階的にヒントを出し、3回間違えたらパスボタンを出す
            if (wrongCount === 1) {
                hintTitle.innerText = '💡 第１ヒント：説明と文字数';
                hintContent.innerText = `${q.hint1} \n （${q.meaning}）`;
                speakText('第１ヒントです。' + q.hint1.replace(/〇/g, 'まる') + 'で、' + q.meaning);
            } else if (wrongCount === 2) {
                hintTitle.innerText = '💡 第２ヒント：最初の文字';
                hintContent.innerText = q.hint2;
                speakText('第２ヒントです。' + q.hint2);
            } else {
                hintTitle.innerText = '💡 第３ヒント：２番目の文字';
                hintContent.innerText = q.hint3;
                speakText('第３ヒントです。' + q.hint3);
                passBtn.style.display = 'inline-block';
            }
        }
    }

    // パス（答えを見る）ボタンを押したときの処理
    passBtn.addEventListener('click', () => {
        const q = activeQuestions[currentQuestionIdx];
        const answerText = q.answers[0]; // ひらがなの答え

        resultContainer.innerHTML = `<span class="result-info">答えは 「${answerText}」 です 🔑</span>`;
        statusMessage.innerText = '答えを確認して、次に進みましょう';
        speakText(`こたえは、 ${answerText} です。`);

        micBtn.style.display = 'none';
        passBtn.style.display = 'none';
        hintCard.style.display = 'none';
        nextBtn.style.display = 'inline-block';
    });

    // レベルアップ / クリアのお祝い画面を出す
    function showLevelUp() {
        levelUpModal.classList.add('show');
        
        if (currentMode === 'level') {
            if (currentLevel < 3) {
                const nextLevel = currentLevel + 1;
                const targetCharCount = nextLevel === 2 ? '３文字' : '４文字';
                levelUpText.innerHTML = `おめでとうございます！🎉<br>レベル ${currentLevel} をクリアしました！<br>次は ${targetCharCount} の言葉に挑戦しましょう！`;
                speakText('レベルアップ！おめでとうございます！つぎは' + targetCharCount + 'の言葉に挑戦しましょう！');
                startNextLevelBtn.innerText = '次へすすむ ➡️';
            } else {
                levelUpText.innerHTML = `おめでとうございます！🎉🎉<br>すべてのレベルをクリアしました！<br>すばらしいリハビリでしたね！`;
                speakText('おめでとうございます！すべてのレベルをクリアしました！素晴らしいリハビリでした！');
                startNextLevelBtn.innerText = 'もういちど最初からあそぶ 🔄';
            }
        } else {
            const genreNames = {
                'どうぶつ': 'どうぶつ',
                'くだもの': 'くだもの',
                'たべもの': 'たべもの',
                'やさい': 'やさい',
                'すいーつ': 'すいーつ',
                'おさけ・のみもの': 'おさけ・のみもの',
                'おんがく・がっき': 'おんがく・がっき'
            };
            const currentGenreName = genreNames[currentGenre] || currentGenre;
            levelUpText.innerHTML = `おめでとうございます！🎉🎉<br>「${currentGenreName}」のジャンルを<br>すべてクリアしました！<br>とても素晴らしいリハビリでしたね！`;
            speakText(`${currentGenreName}のジャンルをすべてクリアしました！おめでとうございます！素晴らしいリハビリでした！`);
            startNextLevelBtn.innerText = 'ちがうジャンルであそぶ ➡️';
        }
    }

    // お祝い画面のボタンを押したとき
    startNextLevelBtn.addEventListener('click', () => {
        levelUpModal.classList.remove('show');
        
        if (currentMode === 'level') {
            if (currentLevel < 3) {
                startLevel(currentLevel + 1);
            } else {
                startLevel(1);
            }
        } else {
            // 次のジャンルへ進む
            const genreList = ['どうぶつ', 'くだもの', 'たべもの', 'やさい', 'すいーつ', 'おさけ・のみもの', 'おんがく・がっき'];
            let nextGenreIdx = (genreList.indexOf(currentGenre) + 1) % genreList.length;
            startGenre(genreList[nextGenreIdx]);
        }
    });

    // 「つぎへすすむ」ボタンを押したとき
    nextBtn.addEventListener('click', () => {
        currentQuestionIdx = (currentQuestionIdx + 1) % activeQuestions.length;
        loadQuestion();
    });

    // 最初に画面を開いたときの処理
    window.onload = () => {
        startLevel(1);
    };
</script>

</body>
</html>
